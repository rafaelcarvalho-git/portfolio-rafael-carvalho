<section id="projects" class="projects section band">
  <div class="container">
    <h2 class="section-heading">
      My<span class="accent">Projects</span>
      <span class="rule"></span>
    </h2>
    <div class="projects-grid" id="projects-grid">
      @for (project of projects; track project.name) {
        <article class="project">
          <div class="project-top">
            <div class="project-ico">▤</div>
            <a
              class="gh mono"
              href="https://github.com/rafaelcarvalho-git"
              target="_blank"
              rel="noreferrer"
              >GitHub
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-github"
              >
                <path
                  d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
                />
                <path d="M9 18c-4.51 2-5-2-7-2" />
              </svg>
            </a>
            <a
              class="gh mono"
              href="https://github.com/rafaelcarvalho-git"
              target="_blank"
              rel="noreferrer"
              >GitHub
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#4672fe"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-radio-icon lucide-radio"
              >
                <path d="M16.247 7.761a6 6 0 0 1 0 8.478" />
                <path d="M19.075 4.933a10 10 0 0 1 0 14.134" />
                <path d="M4.925 19.067a10 10 0 0 1 0-14.134" />
                <path d="M7.753 16.239a6 6 0 0 1 0-8.478" />
                <circle cx="12" cy="12" r="2" /></svg
            ></a>
          </div>
          <h3>{{ project.name }}</h3>
          <p>{{ project.desc }}</p>
          <ul class="stack">
            @for (tech of project.stack; track tech) {
              <li>{{ tech }}</li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
